baseURL: https://nicholasbehr.ch/
languageCode: en-us
title: Nicholas Behr
theme: ["PaperMod"]

enableInlineShortcodes: true
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Nicholas Behr
  description: "personal homepage and project showcase"
  keywords: [Blog, Coding]

  defaultTheme: auto
  ShowReadingTime: true
  ShowWordCount: true

  # home-info mode
  homeInfoParams:
    # https://emojipedia.org/
    Title: "Hi there 👋🏼"
    Content: >
      Welcome to my homepage!
      - Hi, I'm Nicholas, an electrical engineering student at ETH Zurich 🇨🇭.
      - Passionate about optimization and control theory, and embedded programming.
      - This page showcases my side projects, with more to come in the future 💡.

  socialIcons:
    - name: "github"
      url: "https://github.com/NicholasBehr"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/behr"